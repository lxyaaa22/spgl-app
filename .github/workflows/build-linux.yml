name: Build Linux ARM64

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04

    steps:
      # ✅ 1. 强制释放运行器磁盘空间
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      # ✅ 2. 设置 QEMU 以支持 ARM64 模拟
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ✅ 3. 构建 & 打包 ARM64 AppImage
      - name: Build & Package ARM64 AppImage
        run: |
          set -e

          # 定义变量
          DOCKER_IMAGE="debian:11-slim"
          WORKSPACE="/app"
          
          docker run --rm --platform linux/arm64 \
            -v ${GITHUB_WORKSPACE}:${WORKSPACE} \
            -w ${WORKSPACE} \
            ${DOCKER_IMAGE} bash -c "
              set -e
              
              echo '>>> 1. 安装基础依赖和工具链'
              apt-get update
              # 安装关键依赖：zlib1g (运行时), zlib1g-dev (开发时), patchelf, file, fakeroot
              # 注意：debian:11 是 Bullseye，glibc 版本较新但比 Ubuntu 22.04 旧，兼容性更好
              apt-get install -y --no-install-recommends \
                curl \
                build-essential \
                python3 \
                libudev-dev \
                fakeroot \
                dpkg \
                zlib1g \
                zlib1g-dev \
                libglib2.0-0 \
                libnss3 \
                libatk1.0-0 \
                libatk-bridge2.0-0 \
                libcups2 \
                libdrm2 \
                libxkbcommon0 \
                libxcomposite1 \
                libxdamage1 \
                libxrandr2 \
                libgbm1 \
                libpango-1.0-0 \
                libcairo2 \
                libasound2 \
                libxss1 \
                patchelf \
                file \
                wget \
                fuse

              echo '>>> 2. 安装 Node.js 20'
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y --no-install-recommends nodejs

              echo '>>> 3. 构建项目'
              npm ci
              npm run build

              echo '>>> 4. 生成未打包的 Electron 应用 (dir 模式)'
              npx electron-builder --linux dir --arm64 --publish never

              echo '>>> 5. 准备 AppDir 结构'
              # 查找生成的未打包目录
              UNPACKED_DIR=\$(ls -d release/*-linux-arm64-unpacked)
              APP_NAME=\$(basename \"\${UNPACKED_DIR}\" | sed 's/-linux-arm64-unpacked//')
              
              echo \"Found unpacked dir: \${UNPACKED_DIR}\"
              echo \"App Name: \${APP_NAME}\"

              mkdir -p AppDir/usr/lib
              mkdir -p AppDir/usr/bin
              
              # 复制应用文件
              cp -r \"\${UNPACKED_DIR}/.\" AppDir/
              
              # 确保主可执行文件有执行权限
              chmod +x \"AppDir/\${APP_NAME}\"

              echo '>>> 6. 处理 libz 依赖 (关键修复步骤)'
              # 在 Debian/ARM64 中，libz.so.1 是实际文件，libz.so 是软链接
              LIBZ_PATH=/usr/lib/aarch64-linux-gnu/libz.so.1
              LIBZ_LINK=/usr/lib/aarch64-linux-gnu/libz.so
              
              if [ -f \"\${LIBZ_PATH}\" ]; then
                echo \"Copying \${LIBZ_PATH} to AppDir/usr/lib/\"
                cp \"\${LIBZ_PATH}\" AppDir/usr/lib/
                
                # 如果原系统有 libz.so 软链接，也复制过去，或者手动创建
                if [ -L \"\${LIBZ_LINK}\" ]; then
                  cp -d \"\${LIBZ_LINK}\" AppDir/usr/lib/ || true
                else
                  cd AppDir/usr/lib && ln -sf libz.so.1 libz.so && cd -
                fi
              else
                echo \"ERROR: libz.so.1 not found in system!\"
                exit 1
              fi

              echo '>>> 7. 修复二进制文件的 RPATH 和依赖'
              # 使用 patchelf 确保所有二进制文件都能找到 AppDir/usr/lib 中的库
              # 首先，将 AppDir/usr/lib 添加到所有二进制文件的 rpath
              find AppDir -type f \( -name '*.so*' -o -name '*.node' -o -name '\${APP_NAME}' \) -exec \
                patchelf --set-rpath '\\\$ORIGIN/../usr/lib:\\\$ORIGIN/usr/lib:/usr/lib/aarch64-linux-gnu' {} \; 2>/dev/null || true

              # 特别处理：确保没有任何二进制文件硬编码依赖 libz.so (不带版本号)
              # 如果有，将其改为 libz.so.1
              find AppDir -type f \( -name '*.so*' -o -name '*.node' -o -name '\${APP_NAME}' \) -exec \
                bash -c 'for lib in \$(patchelf --print-needed \"\$1\" 2>/dev/null); do if [ \"\$lib\" = \"libz.so\" ]; then patchelf --replace-needed libz.so libz.so.1 \"\$1\"; fi; done' _ {} \; 2>/dev/null || true

              echo '>>> 8. 创建标准的 AppRun'
              cat > AppDir/AppRun << 'EOF'
              #!/bin/sh
              HERE=\"\$(dirname \"\$(readlink -f \"\$0\")\")\"
              export LD_LIBRARY_PATH=\"\${HERE}/usr/lib:\${LD_LIBRARY_PATH}\"
              exec \"\${HERE}/\${APP_NAME_BIN}\" \"\$@\"
              EOF
              # 替换 AppRun 中的占位符
              sed -i \"s|\${APP_NAME_BIN}|\${APP_NAME}|g\" AppDir/AppRun
              chmod +x AppDir/AppRun

              echo '>>> 9. 下载并运行 linuxdeploy 打包 AppImage'
              wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
              chmod +x linuxdeploy-aarch64.AppImage
              
              # 关键：使用 --plugin gtk 或其他插件可能有助于依赖解析，但这里我们手动管理
              # --exclude-library 避免重复打包系统已存在的库，但我们明确 include libz
              ./linuxdeploy-aarch64.AppImage \
                --appdir AppDir \
                --output appimage \
                --library /usr/lib/aarch64-linux-gnu/libz.so.1 \
                --library /usr/lib/aarch64-linux-gnu/libz.so \
                --desktop-file AppDir/*.desktop \
                --icon-file AppDir/*.png \
                2>&1 | tee linuxdeploy.log

              echo '>>> 10. 移动产物'
              mv *.AppImage release/ || true
              
              echo '>>> 11. 最终检查：列出 release 目录'
              ls -lh release/
            "

      # ✅ 4. 上传制品
      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
