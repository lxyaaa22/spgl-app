name: Build Linux
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x64, arm64]  # 同时打包两种主流架构
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev fakeroot dpkg
          # 清理并安装依赖
          rm -rf node_modules package-lock.json
          npm ci
      - run: npm run build
      - run: |
          # electron-builder 原生支持 --x64 / --arm64 参数
          npx electron-builder --linux AppImage --${{ matrix.arch }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-${{ matrix.arch }}
          path: release/*.AppImage
