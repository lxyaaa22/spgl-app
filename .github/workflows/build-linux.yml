name: Build Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      # ✅ 1. 强制释放运行器磁盘空间（关键步骤）
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      # ✅ 2. 使用 npm ci 替代 npm install（更快、更省空间）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build & Package ARM64 AppImage
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            debian:11-slim /bin/bash << 'DOCKER_SCRIPT'
            set -e
            set -x

            echo "🔧 安装基础依赖..."
            apt-get update
            apt-get install -y --no-install-recommends \
              curl build-essential python3 libudev-dev fakeroot dpkg \
              zlib1g libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
              libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
              libpango-1.0-0 libcairo2 libasound2 libxss1 patchelf file

            echo "📦 安装 Node.js 20..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y --no-install-recommends nodejs

            echo "🛠 编译项目..."
            npm ci
            npm run build
            ./node_modules/.bin/electron-builder --linux dir --arm64 --publish never

            echo "📂 准备 AppDir..."
            UNPACKED_DIR=$(ls -d release/*-linux-arm64-unpacked | head -n 1)
            if [ -z "$UNPACKED_DIR" ]; then
              echo "❌ 未找到 electron-builder 输出目录"
              ls -la release/ || true
              exit 1
            fi
            APP_NAME=$(basename "$UNPACKED_DIR" | sed 's/-linux-arm64-unpacked$//')
            mkdir -p AppDir/usr/lib
            cp -r "$UNPACKED_DIR"/. AppDir/
            chmod +x "AppDir/$APP_NAME"

            echo "🔗 修复 libz 依赖..."
            cp /usr/lib/aarch64-linux-gnu/libz.so.1 AppDir/usr/lib/
            ln -sf libz.so.1 AppDir/usr/lib/libz.so

            # 安全替换 DT_NEEDED，避免转义错误
            find AppDir -type f \( -name '*.node' -o -name "$APP_NAME" \) -print0 | \
              xargs -0 -I{} patchelf --replace-needed libz.so libz.so.1 {} 2>/dev/null || true

            echo "🚀 生成 AppRun..."
            cat > AppDir/AppRun << 'APPRUN_EOF'
            #!/bin/sh
            HERE="$(dirname "$(readlink -f "$0")")"
            exec "${HERE}/$(basename "${HERE}")" "$@"
            APPRUN_EOF
            chmod +x AppDir/AppRun

            echo "📦 打包 AppImage..."
            curl -fsSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage \
              -o linuxdeploy.AppImage
            chmod +x linuxdeploy.AppImage
            export APPIMAGE_EXTRACT_AND_RUN=1

            ./linuxdeploy.AppImage \
              --appdir AppDir \
              --output appimage \
              --exclude-library '' \
              --library /usr/lib/aarch64-linux-gnu/libz.so.1 \
              --library /usr/lib/aarch64-linux-gnu/libz.so

            echo "✅ 移动产物..."
            mv *.AppImage release/ 2>/dev/null || true
            DOCKER_SCRIPT



      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
