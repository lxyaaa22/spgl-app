name: Build Linux ARM64
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 App
        env:
          npm_config_build_from_source: true
          # 强制 linuxdeploy 将 libz 打包进 AppImage
          ELECTRON_BUILDER_LINUX_DEPLOY_ARGS: "--library /usr/lib/aarch64-linux-gnu/libz.so.1 --library /usr/lib/aarch64-linux-gnu/libz.so"
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            debian:11-slim bash -c "
            set -e
            apt-get update
            # 安装构建依赖 + Electron 运行时常见基础库（防后续报错）
            apt-get install -y curl build-essential python3 libudev-dev fakeroot dpkg \
              zlib1g libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
              libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
              libpango-1.0-0 libcairo2 libasound2 libxss1

            # 创建 electron-builder/linuxdeploy 需要的无版本号软链接
            ln -sf /usr/lib/aarch64-linux-gnu/libz.so.1 /usr/lib/aarch64-linux-gnu/libz.so

            # 安装 Node.js 20
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs

            # 构建项目
            npm install
            npm run build

            # 打包 AppImage（--linux AppImage 已隐含 arm64 架构）
            npx electron-builder --linux AppImage --arm64 --publish never
          "

      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
