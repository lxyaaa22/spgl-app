name: Build Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      # ✅ 1. 强制释放运行器磁盘空间（关键步骤）
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      # ✅ 2. 使用 npm ci 替代 npm install（更快、更省空间）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build & Package ARM64 AppImage
        run: |
          # 1. 宿主机预先创建目录，确保挂载点存在
          mkdir -p release

          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            debian:11-slim /bin/bash << 'DOCKER_SCRIPT'
          set -e
          set -x

          apt-get update
          apt-get install -y --no-install-recommends \
            curl build-essential python3 libudev-dev fakeroot dpkg \
            zlib1g libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libxss1 patchelf file

          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs

          npm ci
          npm run build
          ./node_modules/.bin/electron-builder --linux dir --arm64 --publish never

          UNPACKED_DIR=$(ls -d /app/release/*-linux-arm64-unpacked | head -n 1)
          if [ -z "$UNPACKED_DIR" ]; then
            echo "❌ 未找到 electron-builder 输出"
            ls -la /app/release/ || true
            exit 1
          fi
          APP_NAME=$(basename "$UNPACKED_DIR" | sed 's/-linux-arm64-unpacked$//')
          mkdir -p /app/AppDir/usr/lib
          cp -r "$UNPACKED_DIR"/. /app/AppDir/
          chmod +x "/app/AppDir/$APP_NAME"

          cp /usr/lib/aarch64-linux-gnu/libz.so.1 /app/AppDir/usr/lib/
          ln -sf libz.so.1 /app/AppDir/usr/lib/libz.so

          find /app/AppDir -type f \( -name '*.node' -o -name "$APP_NAME" \) -print0 | \
            xargs -0 -I{} patchelf --replace-needed libz.so libz.so.1 {} 2>/dev/null || true

          cat > /app/AppDir/AppRun << 'APPRUN_EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "${HERE}/$(basename "${HERE}")" "$@"
          APPRUN_EOF
          chmod +x /app/AppDir/AppRun

          curl -fsSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage \
            -o /app/linuxdeploy.AppImage
          chmod +x /app/linuxdeploy.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1

          cd /app
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --output appimage \
            --exclude-library '' \
            --library /usr/lib/aarch64-linux-gnu/libz.so.1 \
            --library /usr/lib/aarch64-linux-gnu/libz.so

          # 🔍 精准定位并复制产物（替代 mv，避免跨挂载点权限问题）
          APPIMAGE_FILE=$(find /app -maxdepth 1 -name "*.AppImage" -type f | head -n 1)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "❌ FATAL: linuxdeploy 未生成 AppImage"
            ls -la /app/
            exit 1
          fi
          echo "✅ 找到产物: $APPIMAGE_FILE"
          cp "$APPIMAGE_FILE" /app/release/
          sync  # ⚡ 强制 Docker 将文件刷入宿主机磁盘
          DOCKER_SCRIPT

      # 🔎 调试验证（必看）
      - name: Debug Release Dir
        run: |
          echo "📂 宿主机 release 目录:"
          ls -lh release/ || echo "⚠️ 目录为空"
          find . -maxdepth 2 -name "*.AppImage" -exec du -h {} \; || echo "⚠️ 未找到"

      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
          if-no-files-found: error  # 关键：匹配失败直接中断，拒绝假成功

