name: Build Linux ARM64
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      # ✅ 1. 强制释放运行器磁盘空间（关键步骤）
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      # ✅ 2. 使用 npm ci 替代 npm install（更快、更省空间）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 1. 生成构建脚本
        run: |
          cat > build.sh << 'EOF'
          #!/bin/bash
          set -e
          set -o pipefail  # ⚡ 关键：确保 curl 失败时中断整个脚本

          apt-get update
          # 🔧 修复 1：必须安装 ca-certificates，否则 curl 报 SSL(77) 错误
          apt-get install -y --no-install-recommends ca-certificates \
            curl build-essential python3 libudev-dev fakeroot dpkg \
            zlib1g libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libxss1 patchelf file libfuse2

          # 🔧 修复 2：现在 curl 可正常验证 HTTPS
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs

          # 🔍 验证 Node 20 和 npm 是否就绪
          echo "✅ Node 版本: $(node -v)"
          echo "✅ NPM 版本: $(npm -v)"

          npm ci
          npm run build
          ./node_modules/.bin/electron-builder --linux dir --arm64 --publish never

          UNPACKED_DIR=$(ls -d /app/release/*-linux-arm64-unpacked | head -n 1)
          if [ -z "$UNPACKED_DIR" ]; then
            echo "❌ 未找到 unpacked 目录"; ls -la /app/release/; exit 1
          fi

          APP_NAME=$(basename "$UNPACKED_DIR" | sed 's/-linux-arm64-unpacked$//')
          mkdir -p /app/AppDir/usr/lib
          cp -r "$UNPACKED_DIR"/. /app/AppDir/
          chmod +x "/app/AppDir/$APP_NAME"

          cp /usr/lib/aarch64-linux-gnu/libz.so.1 /app/AppDir/usr/lib/
          ln -sf libz.so.1 /app/AppDir/usr/lib/libz.so

          find /app/AppDir -type f \( -name '*.node' -o -name "$APP_NAME" \) -print0 | \
            xargs -0 -I{} patchelf --replace-needed libz.so libz.so.1 {} 2>/dev/null || true

          cat > /app/AppDir/AppRun << 'APPRUN_EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "${HERE}/$(basename "${HERE}")" "$@"
          APPRUN_EOF
          chmod +x /app/AppDir/AppRun

          curl -fsSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage \
            -o /app/linuxdeploy.AppImage
          chmod +x /app/linuxdeploy.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1

          cd /app
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --output appimage \
            --exclude-library '' \
            --library /usr/lib/aarch64-linux-gnu/libz.so.1 \
            --library /usr/lib/aarch64-linux-gnu/libz.so 2>&1 | tee /app/build.log

          echo "📸 [容器内快照] /app 根目录:"
          ls -lh /app/
          echo "📸 [容器内快照] /app/release 目录:"
          ls -lh /app/release/ || echo "⚠️ release 为空"

          APPIMAGE=$(find /app -maxdepth 1 -name "*.AppImage" -type f | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "❌ 致命错误：未生成 .AppImage。查看日志:"
            tail -n 30 /app/build.log
            exit 1
          fi

          echo "✅ 找到产物: $APPIMAGE"
          cp -v "$APPIMAGE" /app/release/
          sync
          echo "✅ 已强制落盘到宿主机"
          EOF
          chmod +x build.sh
