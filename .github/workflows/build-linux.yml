name: Build Linux ARM64

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ✅ 1. 强制释放运行器磁盘空间 (已移除 flaky 的 docker prune)
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ✅ 2. 构建 & 打包 ARM64 AppImage (安全脚本注入法)
      - name: Build & Package ARM64 AppImage
        run: |
          printf '%s\n' '#!/bin/bash' 'set -ex' '' \
            'echo ">>> 1. 安装基础依赖"' \
            'apt-get update' \
            'apt-get install -y --no-install-recommends \
              curl wget ca-certificates build-essential python3 libudev-dev fakeroot dpkg \
              zlib1g:arm64 zlib1g-dev:arm64 libglib2.0-0:arm64 libnss3:arm64 \
              libatk1.0-0:arm64 libatk-bridge2.0-0:arm64 libcups2:arm64 libdrm2:arm64 \
              libxkbcommon0:arm64 libxcomposite1:arm64 libxdamage1:arm64 libxrandr2:arm64 \
              libgbm1:arm64 libpango-1.0-0:arm64 libcairo2:arm64 libasound2:arm64 libxss1:arm64 \
              patchelf:arm64 file fuse xz-utils' \
            'update-ca-certificates' \
            '' \
            'echo ">>> 2. 安装 Node.js 20"' \
            'NODE_VERSION=20.11.0' \
            'curl -fsSL https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-arm64.tar.xz -o node.tar.xz' \
            'tar -xf node.tar.xz -C /usr/local --strip-components=1' \
            'rm -f node.tar.xz' \
            'node -v && npm -v' \
            '' \
            'echo ">>> 3. 构建项目"' \
            'npm ci' \
            'npm run build' \
            '' \
            'echo ">>> 4. 生成未打包的 Electron 应用"' \
            'npx electron-builder --linux dir --arm64 --publish never' \
            '' \
            'echo ">>> 5. 准备 AppDir 结构"' \
            'UNPACKED_DIR=$(find release dist -maxdepth 1 -type d -name "*-unpacked" | head -n 1)' \
            'if [ -z "${UNPACKED_DIR}" ]; then echo "❌ 找不到 unpacked 目录"; ls -la release/ dist/ 2>/dev/null; exit 1; fi' \
            'echo "✅ 找到: ${UNPACKED_DIR}"' \
            '' \
            'APP_NAME=$(node -e "try{const p=require(\"./package.json\");console.log(p.productName||p.name)}catch(e){console.log(\"\")}" 2>/dev/null)' \
            'if [ -z "${APP_NAME}" ] || [ ! -f "${UNPACKED_DIR}/${APP_NAME}" ]; then' \
            '  APP_NAME=$(find "${UNPACKED_DIR}" -maxdepth 1 -type f -executable \
              ! -name "chrome*" ! -name "lib*" ! -name "*.so*" ! -name "*.node" ! -name "*.sh" \
              -exec basename {} \; | head -n 1)' \
            'fi' \
            'if [ -z "${APP_NAME}" ]; then echo "❌ 无法确定主程序名"; exit 1; fi' \
            'echo "✅ 主程序: ${APP_NAME}"' \
            '' \
            'mkdir -p AppDir/usr/lib' \
            'cp -r "${UNPACKED_DIR}/." AppDir/' \
            'chmod +x "AppDir/${APP_NAME}"' \
            '' \
            'echo ">>> 6. 修复 libz 依赖"' \
            'LIBZ_PATH=$(find /usr/lib /lib -name "libz.so.1" -type f 2>/dev/null | head -n 1)' \
            'if [ -z "${LIBZ_PATH}" ]; then apt-get install -y --reinstall zlib1g:arm64; LIBZ_PATH=$(find /usr/lib /lib -name "libz.so.1" -type f 2>/dev/null | head -n 1); fi' \
            'if [ -z "${LIBZ_PATH}" ]; then echo "❌ 找不到 libz.so.1"; exit 1; fi' \
            'cp "${LIBZ_PATH}" AppDir/usr/lib/' \
            'ln -sf libz.so.1 AppDir/usr/lib/libz.so' \
            '' \
            'echo ">>> 7. 修复 RPATH"' \
            'find AppDir -type f \( -name "*.so*" -o -name "*.node" -o -name "${APP_NAME}" \) -exec \
              patchelf --set-rpath "\$ORIGIN/../usr/lib:\$ORIGIN/usr/lib:/usr/lib/aarch64-linux-gnu" {} \; 2>/dev/null || true' \
            'find AppDir -type f \( -name "*.so*" -o -name "*.node" -o -name "${APP_NAME}" \) -exec \
              bash -c "for lib in \$(patchelf --print-needed \"\$1\" 2>/dev/null); do [ \"\$lib\" = \"libz.so\" ] && patchelf --replace-needed libz.so libz.so.1 \"\$1\"; done" _ {} \; 2>/dev/null || true' \
            '' \
            'echo ">>> 8. 创建 AppRun"' \
            'printf "#!/bin/sh\nHERE=\"\$(dirname \"\$(readlink -f \"\$0\")\")\"\nexport LD_LIBRARY_PATH=\"\${HERE}/usr/lib:\${LD_LIBRARY_PATH}\"\nexec \"\${HERE}/%s\" \"\$@\"\n" "${APP_NAME}" > AppDir/AppRun' \
            'chmod +x AppDir/AppRun' \
            '' \
            'echo ">>> 9. 运行 linuxdeploy 打包"' \
            'curl -fsSL -o linuxdeploy-aarch64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage' \
            'chmod +x linuxdeploy-aarch64.AppImage' \
            'DEPLOY_ARGS="--appdir AppDir --output appimage"' \
            'DESKTOP_FILE=$(find AppDir -name "*.desktop" -print -quit)' \
            'ICON_FILE=$(find AppDir \( -name "*.png" -o -name "*.svg" -o -name "*.xpm" \) -print -quit)' \
            '[ -n "${DESKTOP_FILE}" ] && DEPLOY_ARGS="${DEPLOY_ARGS} --desktop-file ${DESKTOP_FILE}"' \
            '[ -n "${ICON_FILE}" ] && DEPLOY_ARGS="${DEPLOY_ARGS} --icon-file ${ICON_FILE}"' \
            './linuxdeploy-aarch64.AppImage ${DEPLOY_ARGS} 2>&1 | tee /app/linuxdeploy.log' \
            '' \
            'echo ">>> 10. 验证并转移产物"' \
            'mkdir -p /app/release' \
            'APPIMAGE=$(find /app -maxdepth 1 -name "*.AppImage" -print -quit)' \
            'if [ -z "${APPIMAGE}" ]; then echo "❌ 打包失败"; tail -n 50 /app/linuxdeploy.log; exit 1; fi' \
            'echo "✅ 成功生成: $(basename ${APPIMAGE})"' \
            'mv "${APPIMAGE}" /app/release/' \
            'ls -lh /app/release/' > /tmp/build.sh

          chmod +x /tmp/build.sh
          docker run --rm --platform linux/arm64 \
            -v ${GITHUB_WORKSPACE}:/app \
            -w /app \
            "debian:11-slim" bash /tmp/build.sh

      # ✅ 3. 上传制品
      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
          if-no-files-found: error
