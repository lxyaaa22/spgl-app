name: Build Linux ARM64
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 App
        env:
          npm_config_build_from_source: true  # 强制重新编译原生模块
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            arm64v8/node:20-slim bash -c "
            apt-get update && apt-get install -y build-essential python3 libudev-dev fakeroot dpkg && \
            npm install && \
            npm run build && \
            npx electron-builder --linux AppImage --arm64 --publish never
          "

      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
