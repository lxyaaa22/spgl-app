name: Build Linux ARM64
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build & Package ARM64 AppImage
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            debian:11-slim bash -c "
            set -e

            # 1. 安装依赖 + 工具链
            apt-get update
            apt-get install -y curl build-essential python3 libudev-dev fakeroot dpkg \
              zlib1g libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
              libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
              libpango-1.0-0 libcairo2 libasound2 libxss1 patchelf

            # 安装 Node.js 20
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs

            # 2. 构建项目（输出为 dir 模式，便于干预）
            npm install
            npm run build
            npx electron-builder --linux dir --arm64 --publish never

            # 3. 准备 AppDir 结构
            UNPACKED_DIR=$(ls -d release/*-linux-arm64-unpacked)
            APP_NAME=$(basename \"$UNPACKED_DIR\" | sed 's/-linux-arm64-unpacked$//')
            mkdir -p AppDir/usr/lib
            cp -r \"\$UNPACKED_DIR\"/. AppDir/
            chmod +x \"AppDir/\$APP_NAME\"

            # 4. 修复 libz.so 依赖（关键步骤）
            # 4.1 拷贝 libz.so.1
            cp /usr/lib/aarch64-linux-gnu/libz.so.1 AppDir/usr/lib/
            # 4.2 创建报错所需的无版本软链接
            ln -sf libz.so.1 AppDir/usr/lib/libz.so

            # 4.3 扫描所有 .node 和可执行文件，将 DT_NEEDED 中的 libz.so 替换为 libz.so.1（双保险）
            find AppDir -type f \\( -name '*.node' -o -name '\$APP_NAME' \\) -exec \
              patchelf --replace-needed libz.so libz.so.1 {} \; 2>/dev/null || true

            # 5. 下载并运行 linuxdeploy（清空排除列表，强制打包 libz）
            wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
            chmod +x linuxdeploy-aarch64.AppImage

            # 创建 AppRun
            cat > AppDir/AppRun << 'EOF'
            #!/bin/sh
            HERE=\"\$(dirname \"\$(readlink -f \"\$0\")\")\"
            exec \"\${HERE}/\$(basename \"\${HERE}\")\" \"\$@\"
            EOF
            chmod +x AppDir/AppRun

            ./linuxdeploy-aarch64.AppImage \
              --appdir AppDir \
              --output appimage \
              --exclude-library '' \
              --library /usr/lib/aarch64-linux-gnu/libz.so.1 \
              --library /usr/lib/aarch64-linux-gnu/libz.so

            # 6. 移动产物到 release 目录（保持原路径）
            mv *.AppImage release/ || true
            "

      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
