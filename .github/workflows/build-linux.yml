name: Build Linux ARM64 AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    steps:
      # 1. 清理 Runner 磁盘
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          sudo apt-get clean
          df -h

      # 2. 检出代码
      - uses: actions/checkout@v4

      # 3. 配置 QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # 4. 生成构建脚本（规避 Heredoc 解析陷阱）
      - name: Generate Build Script
        run: |
          cat > build.sh << 'OUTER_EOF'
          #!/bin/bash
          set -e
          set -o pipefail
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates \
            curl build-essential python3 libudev-dev fakeroot dpkg \
            zlib1g libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libxss1 patchelf file libfuse2
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs
          npm ci
          npm run build
          ./node_modules/.bin/electron-builder --linux dir --arm64 --publish never

          UNPACKED_DIR=$(ls -d /app/release/*-linux-arm64-unpacked | head -n 1)
          APP_NAME=$(basename "$UNPACKED_DIR" | sed 's/-linux-arm64-unpacked$//')
          mkdir -p /app/AppDir/usr/lib
          cp -r "$UNPACKED_DIR"/. /app/AppDir/
          chmod +x "/app/AppDir/$APP_NAME"

          cp /usr/lib/aarch64-linux-gnu/libz.so.1 /app/AppDir/usr/lib/
          ln -sf libz.so.1 /app/AppDir/usr/lib/libz.so
          find /app/AppDir -type f \( -name '*.node' -o -name "$APP_NAME" \) -print0 | \
            xargs -0 -I{} patchelf --replace-needed libz.so libz.so.1 {} 2>/dev/null || true

          cat > /app/AppDir/AppRun << 'APPRUN_EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "${HERE}/$(basename "${HERE}")" "$@"
          APPRUN_EOF
          chmod +x /app/AppDir/AppRun

          curl -fsSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage \
            -o /app/linuxdeploy.AppImage
          chmod +x /app/linuxdeploy.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1

          cd /app
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --output appimage \
            --exclude-library '' \
            --library /usr/lib/aarch64-linux-gnu/libz.so.1 \
            --library /usr/lib/aarch64-linux-gnu/libz.so 2>&1 | tee /app/build.log

          APPIMAGE=$(find /app -maxdepth 1 -name "*.AppImage" -type f | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "❌ FATAL: No .AppImage generated"
            tail -n 20 /app/build.log
            exit 1
          fi

          # 强制复制到固定目录，彻底隔离挂载卷同步问题
          mkdir -p /app/final-output
          cp -v "$APPIMAGE" /app/final-output/
          sync
          echo "✅ Synced to /app/final-output/"
          ls -lh /app/final-output/
          OUTER_EOF
          chmod +x build.sh

      # 5. 执行 Docker 构建
      - name: Execute Docker Build
        run: |
          mkdir -p release
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app \
            -w /app \
            debian:11-slim /bin/bash /app/build.sh

      # 6. 宿主机精准提取（解决 Docker 卷未落盘问题）
      - name: Extract Artifact to Host
        run: |
          echo "🔍 扫描工作区..."
          find ${{ github.workspace }} -name "*.AppImage" -type f -exec ls -lh {} \;
          
          # 复制到一个绝对明确的目录
          mkdir -p upload-ready
          cp -v ${{ github.workspace }}/final-output/*.AppImage upload-ready/ 2>/dev/null || {
            echo "⚠️ 未从 final-output 找到，尝试全局兜底..."
            find ${{ github.workspace }} -name "*.AppImage" -type f -exec cp {} upload-ready/ \;
          }
          echo "📦 待上传文件:"
          ls -lh upload-ready/

      # 7. 上传产物（强制绝对路径 + 明确目录）
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: upload-ready/
          if-no-files-found: error
          retention-days: 14
