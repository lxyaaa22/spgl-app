name: Build Linux ARM64

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ✅ 1. 强制释放运行器磁盘空间
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4

      # ✅ 2. 设置 QEMU 以支持 ARM64 模拟
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ✅ 3. 构建 & 打包 ARM64 AppImage
      - name: Build & Package ARM64 AppImage
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${GITHUB_WORKSPACE}:/app \
            -w /app \
            "debian:11-slim" bash <<'DOCKER_SCRIPT'
set -ex

echo '>>> 1. 安装基础依赖'
apt-get update
apt-get install -y --no-install-recommends \
  curl wget ca-certificates build-essential python3 libudev-dev fakeroot dpkg \
  zlib1g zlib1g-dev libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
  libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
  libpango-1.0-0 libcairo2 libasound2 libxss1 patchelf file fuse xz-utils
update-ca-certificates

echo '>>> 2. 安装 Node.js 20 (ARM64)'
NODE_VERSION=20.11.0
curl -fsSL https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-arm64.tar.xz -o node.tar.xz
tar -xf node.tar.xz -C /usr/local --strip-components=1
rm -f node.tar.xz
node -v && npm -v

echo '>>> 3. 构建项目'
npm ci
npm run build

echo '>>> 4. 生成未打包的 Electron 应用'
npx electron-builder --linux dir --arm64 --publish never

echo '>>> 5. 准备 AppDir 结构'
UNPACKED_DIR=$(find release dist -maxdepth 1 -type d -name '*-unpacked' | head -n 1)
if [ -z "${UNPACKED_DIR}" ]; then
  echo "❌ 找不到 unpacked 目录"
  ls -la release/ dist/ 2>/dev/null || echo "无输出"
  exit 1
fi
echo "✅ 找到: ${UNPACKED_DIR}"

MAIN_EXEC=$(find "${UNPACKED_DIR}" -maxdepth 1 -type f -executable ! -name "*.so" ! -name "*.node" ! -name "*.sh" | head -n 1)
APP_NAME=$(basename "${MAIN_EXEC}")
echo "✅ 主程序: ${APP_NAME}"

mkdir -p AppDir/usr/lib
cp -r "${UNPACKED_DIR}/." AppDir/
chmod +x "AppDir/${APP_NAME}"

echo '>>> 6. 修复 libz 依赖'
cp /usr/lib/aarch64-linux-gnu/libz.so.1 AppDir/usr/lib/
if [ -L /usr/lib/aarch64-linux-gnu/libz.so ]; then
  cp -d /usr/lib/aarch64-linux-gnu/libz.so AppDir/usr/lib/ || true
else
  ln -sf libz.so.1 AppDir/usr/lib/libz.so
fi

echo '>>> 7. 修复 RPATH'
find AppDir -type f \( -name '*.so*' -o -name '*.node' -o -name "${APP_NAME}" \) -exec \
  patchelf --set-rpath '\$ORIGIN/../usr/lib:\$ORIGIN/usr/lib:/usr/lib/aarch64-linux-gnu' {} \; 2>/dev/null || true
find AppDir -type f \( -name '*.so*' -o -name '*.node' -o -name "${APP_NAME}" \) -exec \
  bash -c 'for lib in $(patchelf --print-needed "$1" 2>/dev/null); do [ "$lib" = "libz.so" ] && patchelf --replace-needed libz.so libz.so.1 "$1"; done' _ {} \; 2>/dev/null || true

echo '>>> 8. 创建 AppRun'
cat > AppDir/AppRun << APPRUN
#!/bin/sh
HERE="$(dirname "$(readlink -f "$0")")"
export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
exec "${HERE}/${APP_NAME}" "$@"
APPRUN
chmod +x AppDir/AppRun

echo '>>> 9. 运行 linuxdeploy 打包'
curl -fsSL -o linuxdeploy-aarch64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
chmod +x linuxdeploy-aarch64.AppImage

DEPLOY_ARGS="--appdir AppDir --output appimage"
DESKTOP_FILE=$(find AppDir -name '*.desktop' -print -quit)
ICON_FILE=$(find AppDir \( -name '*.png' -o -name '*.svg' -o -name '*.xpm' \) -print -quit)
[ -n "${DESKTOP_FILE}" ] && DEPLOY_ARGS="${DEPLOY_ARGS} --desktop-file ${DESKTOP_FILE}"
[ -n "${ICON_FILE}" ] && DEPLOY_ARGS="${DEPLOY_ARGS} --icon-file ${ICON_FILE}"

./linuxdeploy-aarch64.AppImage ${DEPLOY_ARGS} 2>&1 | tee /app/linuxdeploy.log

echo '>>> 10. 验证并转移产物'
mkdir -p /app/release
APPIMAGE=$(find /app -maxdepth 1 -name "*.AppImage" -print -quit)
if [ -z "${APPIMAGE}" ]; then
  echo "❌ 打包失败：未生成 .AppImage"
  echo "--- linuxdeploy 日志末尾 ---"
  tail -n 50 /app/linuxdeploy.log
  exit 1
fi
echo "✅ 成功生成: $(basename ${APPIMAGE})"
mv "${APPIMAGE}" /app/release/
ls -lh /app/release/
DOCKER_SCRIPT

      # ✅ 4. 上传制品
      - uses: actions/upload-artifact@v4
        with:
          name: SPGL-Linux-arm64
          path: release/*.AppImage
          if-no-files-found: error
